<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fira Demo Portal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.132.0/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"ui5.fira.demos": "./"}'
    data-sap-ui-async="true"
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
    data-sap-ui-frameOptions="trusted"
    data-sap-ui-libs="sap.m,sap.ui.core,sap.ui.layout,sap.f,sap.tnt,sap.uxap,sap.ui.table,sap.ui.unified">
  </script>
</head>
<style>html, body { height: 100%; margin: 0; }</style>
<body class="sapUiBody" id="content" style="height:100%">
  <div
    data-sap-ui-component
    data-name="ui5.fira.demos"
    data-id="container"
    data-settings='{"id":"demos","componentData":{"playgroundUrl":"http://localhost:8081"}}'
    style="height:100%">
  </div>
</body>
</html>
